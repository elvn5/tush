services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: morpheus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d morpheus"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: host=postgres user=postgres password=postgres dbname=morpheus port=5432 sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
